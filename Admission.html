<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission Page</title>
    <link rel="stylesheet" href="Admission.css">
</head>

<body>
    <!-- Header -->
    <header>
        <div class="contianer container-header">
            <h2>🎓 Govt. MC High School</h2>

            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="About.html">About</a></li>
                    <li><a href="Admission.html">Admission</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!--  -->

    <section class="admission">
        <div class="container">
            <h3 class="section-title">Admission Form</h3>

            <div class="admission-container">
                <form class="admission-form">

                    <input type="text" placeholder="Student Full Name" required>
                    <input type="text" placeholder="Father Full Name" required>
                    <input type="email" placeholder="Email" required>
                    <input type="tel" placeholder="Phone Number" required>
                    <select name="Class" id="" required>
                        <option value="select">Select Class</option>
                        <option value="8th class">Middle</option>
                        <option value="9th class">Matric Part-I</option>
                        <option value="10th class">Matric Part-II</option>
                    </select>

                    <textarea rows="4" placeholder="Message"></textarea>
                    <button class="btn">Submit Application</button>
                </form>


                <div class="contact-info">
                    <h3>Contact Information</h3>
                    <p><strong>Address: </strong>Main Street city, Pakistan</p>
                    <p><strong>Phone: </strong>0300-1234567</p>
                    <p><strong>Email: </strong>schoolname@.edu.pk.com</p>
                </div>
            </div>
        </div>


    </section>


</body>

</html>
